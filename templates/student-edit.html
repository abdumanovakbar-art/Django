<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
</head>
<body>

<form action="{% url 'student-edit' student.id %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="first_name" value="{{ student.first_name }}">
    <input type="text" name="last_name" value="{{ student.last_name }}">
    <input type="number" name="age" value="{{ student.age }}">

    <select name="gender">
        <option value="male" {% if student.gender == "male" %}selected{% endif %}>Erkak</option>
        <option value="female" {% if student.gender == "female" %}selected{% endif %}>Ayol</option>
    </select>

    <input type="text" name="address" value="{{ student.address }}">

    <select name="course">
        <option value="it" {% if student.course == "it" %}selected{% endif %}>IT</option>
        <option value="english" {% if student.course == "english" %}selected{% endif %}>English</option>
    </select>

    <input type="file" name="photo">

    <button type="submit">Yangilash</button>
</form>

</body>
</html>
